<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakshmi Embroidery | Designs</title>
    <link rel="icon" href="../../shop_photos/logo.jpeg" type="image/jpeg" />
    <link rel="shortcut icon" href="../../shop_photos/logo.jpeg" type="image/jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Bebas+Neue&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="../../tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../before_login,signup/style.css" />
  </head>

  <body class="text-ink font-body">
    <div class="page-shell">
      <header class="site-header">
        <a class="home-logo" href="index.html" aria-label="Lakshmi Tailoring Studio account">
          <img src="../../shop_photos/logo.jpeg" alt="Lakshmi Tailoring Studio logo" />
        </a>
        <nav class="site-nav">
          <a href="index.html">Account</a>
          <a class="active" href="designs.html">Designs</a>
          <a href="cart.html">Cart</a>
          <a href="videocall.html">Video Calls</a>
          <a href="/logout">Logout</a>
        </nav>
      </header>

      <main class="stack-layout">
        

        <section class="search-card" aria-label="Search designs">
          <label class="sr-only" for="design-search">Search Designs</label>
          <span class="search-icon" aria-hidden="true"></span>
          <input
            id="design-search"
            type="search"
            placeholder="Search by design name or price"
            data-design-search
          />
        </section>

        <section class="card-grid" data-design-grid data-cart-mode="cart">
          <article class="design-card">
            <h2>Loading Designs...</h2>
            <p>Your gallery is being prepared from <code>products/products_list.csv</code>.</p>
          </article>
        </section>
      </main>
    </div>
    <script src="../../script.js"></script>
  </body>
</html>
