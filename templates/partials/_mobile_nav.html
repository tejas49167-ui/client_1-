{% set active_endpoint = request.endpoint or "" %}

<nav class="mobile-bottom-nav {{ 'is-authenticated' if current_user.is_authenticated else 'is-guest' }}" aria-label="Mobile navigation">
  <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint == 'main.landing' }}" href="{{ url_for('main.landing') }}" aria-label="Home" title="Home">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5h-5.2v-6.4H8.7V21H3.5a.5.5 0 0 1-.5-.5z" />
    </svg>
    <span>Home</span>
  </a>
  <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint.startswith('products.') }}" href="{{ url_for('products.product_list') }}" aria-label="Shop" title="Shop">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h5A1.5 1.5 0 0 1 12 5.5v5a1.5 1.5 0 0 1-1.5 1.5h-5A1.5 1.5 0 0 1 4 10.5zm8 8A1.5 1.5 0 0 1 13.5 12h5a1.5 1.5 0 0 1 1.5 1.5v5a1.5 1.5 0 0 1-1.5 1.5h-5a1.5 1.5 0 0 1-1.5-1.5zM4 15.5A1.5 1.5 0 0 1 5.5 14h3A1.5 1.5 0 0 1 10 15.5v3A1.5 1.5 0 0 1 8.5 20h-3A1.5 1.5 0 0 1 4 18.5zM14 5.5A1.5 1.5 0 0 1 15.5 4h3A1.5 1.5 0 0 1 20 5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 14 8.5z" />
    </svg>
    <span>Shop</span>
  </a>
  {% if current_user.is_authenticated %}
    <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint.startswith('cart.') }}" href="{{ url_for('cart.cart_page') }}" aria-label="Cart" title="Cart">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M6.2 6 7 15.2A2 2 0 0 0 9 17h6a2 2 0 0 0 2-1.8L17.8 6zm3.3-2.5A2.5 2.5 0 0 1 12 1a2.5 2.5 0 0 1 2.5 2.5V6h-2V3.5a.5.5 0 0 0-1 0V6h-2zM9 19.25A1.25 1.25 0 1 0 9 21.75a1.25 1.25 0 0 0 0-2.5m6 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5" />
      </svg>
      <span>Cart</span>
    </a>
    <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint == 'main.account' }}" href="{{ url_for('main.account') }}" aria-label="Account" title="Account">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8m-7 8.5A7.5 7.5 0 0 1 12.5 13h-1A7.5 7.5 0 0 1 19 20.5a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5" />
      </svg>
      <span>Account</span>
    </a>
    <a class="mobile-bottom-nav__item" href="{{ url_for('auth.logout') }}" aria-label="Logout" title="Logout" data-confirm-logout>
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M4.5 3A1.5 1.5 0 0 0 3 4.5v15A1.5 1.5 0 0 0 4.5 21h7a1.5 1.5 0 0 0 1.5-1.5V16h-2v3H5V5h6v3h2V4.5A1.5 1.5 0 0 0 11.5 3zm11.9 4L15 8.4l2.6 2.6H9v2h8.6L15 15.6l1.4 1.4 5-5z" />
      </svg>
      <span>Logout</span>
    </a>
  {% else %}
    <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint == 'auth.login' }}" href="{{ url_for('auth.login') }}" aria-label="Login" title="Login">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M10 4.5A1.5 1.5 0 0 1 11.5 3h7A1.5 1.5 0 0 1 20 4.5v15a1.5 1.5 0 0 1-1.5 1.5h-7a1.5 1.5 0 0 1-1.5-1.5V16h2v3h6V5h-6v3h-2zM4 11h8.2L9.6 8.4 11 7l5 5-5 5-1.4-1.4 2.6-2.6H4z" />
      </svg>
      <span>Login</span>
    </a>
    <a class="mobile-bottom-nav__item {{ 'is-active' if active_endpoint == 'auth.signup' }}" href="{{ url_for('auth.signup') }}" aria-label="Signup" title="Signup">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M9 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8m-7 8a7 7 0 0 1 14 0 .5.5 0 0 1-.5.5h-13A.5.5 0 0 1 2 20m15-9V8h-3V6h3V3h2v3h3v2h-3v3z" />
      </svg>
      <span>Signup</span>
    </a>
  {% endif %}
</nav>
