{% extends "base.html" %}

{% block title %}Lakshmi Embroidery | Home{% endblock %}

{% block content %}
  <section class="relative overflow-hidden rounded-lg bg-white shadow" data-slider>
    <div class="flex transition-transform duration-500" data-slider-track>
      {% for slide in slides %}
        <img class="h-56 w-full shrink-0 object-cover md:h-80" src="{{ url_for('static', filename=slide) }}" alt="Featured tailoring slide {{ loop.index }}" />
      {% endfor %}
    </div>
    <button class="slider-arrow left-0" type="button" data-slider-prev aria-label="Previous slide">‹</button>
    <button class="slider-arrow right-0" type="button" data-slider-next aria-label="Next slide">›</button>
  </section>

  

  <section class="mt-8">
    <div class="mb-4 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <h2 class="text-2xl font-bold">Featured designs</h2>
      </div>
      <a class="text-sm font-semibold text-amber-700" href="{{ url_for('products.product_list') }}">View all</a>
    </div>
    <div class="product-grid" data-product-grid>
      {% for product in products %}
        {% include "products/_card.html" %}
      {% endfor %}
    </div>
    
  </section>
{% endblock %}
