{% extends "base.html" %}

{% block title %}Signup | Lakshmi Embroidery{% endblock %}

{% block content %}
  <section class="active">
    <div class="container active">
      <div class="user signinBx">
        <div class="imgBx">
          <img src="{{ url_for('static', filename='images/shop/slide1.jpg') }}" alt="Embroidery design" />
        </div>
        <div class="formBx">
          <form method="post" action="{{ url_for('auth.login', next=request.values.get('next')) if request.values.get('next') else url_for('auth.login') }}">
            <h2>Log In</h2>
            <input
              type="text"
              name="identifier"
              placeholder="Email or phone number"
              autocomplete="username"
              required
              value="{{ form_data.identifier if form_data is defined else '' }}"
            />
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" required />
            <input type="submit" value="Login" />
            <p class="signup">don't have an account ? <a href="{{ url_for('auth.signup') }}" onclick="toggleForm(event);">Registr.</a></p>
          </form>
        </div>
      </div>

      <div class="user signupBx">
        <div class="formBx">
          <form method="post" action="{{ url_for('auth.signup', next=request.values.get('next')) if request.values.get('next') else url_for('auth.signup') }}">
            <h2>Create an account</h2>
            <input
              type="text"
              name="full_name"
              placeholder="Full Name"
              autocomplete="name"
              required
              value="{{ form_data.full_name if form_data is defined else '' }}"
            />
            <input
              type="tel"
              name="phone"
              placeholder="Phone Number"
              autocomplete="tel"
              required
              value="{{ form_data.phone if form_data is defined else '' }}"
            />
            <input
              type="email"
              name="email"
              placeholder="Email Address"
              autocomplete="email"
              required
              value="{{ form_data.email if form_data is defined else '' }}"
            />
            <input type="password" name="password" placeholder="Create Password" autocomplete="new-password" required />
            <input type="password" name="confirm_password" placeholder="Confim Password" autocomplete="new-password" required />
            <input type="submit" value="sign up" />
            <p class="signup">Already have an account ? <a href="{{ url_for('auth.login') }}" onclick="toggleForm(event);">Login.</a></p>
          </form>
        </div>
        <div class="imgBx">
          <img src="{{ url_for('static', filename='images/shop/slide3.jpg') }}" alt="Tailoring work" />
        </div>
      </div>
    </div>
  </section>
{% endblock %}
