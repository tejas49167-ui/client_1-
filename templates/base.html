<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Lakshmi Embroidery{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='images/shop/logo.jpeg') }}" type="image/jpeg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body class="flex min-h-screen flex-col text-slate-900">
    {% include "partials/_navbar.html" %}

    <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-6">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-5 grid gap-2">
            {% for category, message in messages %}
              <p class="rounded-md border px-4 py-3 text-sm {{ 'border-red-200 bg-red-50 text-red-700' if category == 'error' else 'border-emerald-200 bg-emerald-50 text-emerald-700' }}">
                {{ message }}
              </p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    {% include "partials/_footer.html" %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
