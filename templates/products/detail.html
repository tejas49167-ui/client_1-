{% extends "base.html" %}

{% block title %}{{ product.name }} | Lakshmi Embroidery{% endblock %}

{% block content %}
  <section class="grid gap-8 rounded-lg bg-white p-6 shadow md:grid-cols-2">
    <img class="h-96 w-full rounded-lg object-cover" src="{{ product_image_url(product) }}" alt="{{ product.name }}" />
    <div>
      <p class="text-sm font-semibold uppercase tracking-wide text-amber-700">{{ product.category }}</p>
      <h1 class="mt-2 text-3xl font-bold">{{ product.name }}</h1>
      <p class="mt-4 text-3xl font-bold">Rs. {{ "%.0f"|format(product.price) }}</p>
      <p class="mt-4 text-slate-600">{{ product.description }}</p>
      <form class="mt-6 flex max-w-sm gap-3" action="{{ url_for('cart.add_to_cart', product_id=product.id) }}" method="post">
        <input class="form-input w-24" type="number" name="quantity" value="1" min="1" />
        <button class="btn-primary flex-1" type="submit">Add to Cart</button>
      </form>
    </div>
  </section>
{% endblock %}
