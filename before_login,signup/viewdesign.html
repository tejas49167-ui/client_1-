<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakshmi Embroidery | Designs</title>
    <link rel="icon" href="../shop_photos/logo.jpeg" type="image/jpeg" />
    <link rel="shortcut icon" href="../shop_photos/logo.jpeg" type="image/jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Bebas+Neue&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="../tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="text-ink font-body">
    <div class="page-shell">
      <header class="site-header">
        <a class="home-logo" href="index.html" aria-label="Lakshmi Tailoring Studio home">
          <img src="../shop_photos/logo.jpeg" alt="Lakshmi Tailoring Studio logo" />
        </a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="aboutus.html">About</a>
          <a href="others.html">Services</a>
          <a href="videocall.html">Consultation</a>
          <a class="active" href="viewdesign.html">Designs</a>
          <a href="login.html">Login</a>

          <div class="language-switch" aria-label="Language options">
            <button type="button" data-lang-option="en">English</button>
            <button type="button" data-lang-option="kn">ಕನ್ನಡ</button>
          </div>
        </nav>
      </header>

      <main class="stack-layout">
        <section class="hero-card user-hero">
          <p class="eyebrow">Design Gallery</p>
          <h1 class="hero-title">Browse clean design references and pricing.</h1>
          <p class="hero-copy">
            Designs load from the product CSV, so the gallery can be updated without changing the page code.
          </p>
        </section>

        <section class="search-card" aria-label="Search designs">
          <label class="sr-only" for="design-search">Search Designs</label>
          <span class="search-icon" aria-hidden="true"></span>
          <input
            id="design-search"
            type="search"
            placeholder="Search by design name or price"
            data-design-search
          />
        </section>

        <section class="card-grid" data-design-grid data-cart-mode="login">
          <article class="design-card">
            <h2>Loading Designs...</h2>
            <p>Your gallery is being prepared from <code>products/products_list.csv</code>.</p>
          </article>
        </section>
      </main>
    </div>
    <script src="../script.js"></script>
  </body>
</html>
