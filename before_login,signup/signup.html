<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakshmi Embroidery | Signup</title>
    <link rel="icon" href="../shop_photos/logo.jpeg" type="image/jpeg" />
    <link rel="shortcut icon" href="../shop_photos/logo.jpeg" type="image/jpeg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Bebas+Neue&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="../tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="text-ink font-body">
    <div class="page-shell min-h-screen flex flex-col">

      <header class="site-header">
        <div class="header-inner">
          <a class="home-logo" href="index.html" aria-label="Lakshmi Tailoring Studio home">
            <img src="../shop_photos/logo.jpeg" alt="Lakshmi Tailoring Studio logo" />
          </a>

          <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>

            <div class="language-switch" aria-label="Language options">
              <button type="button" data-lang-option="en">English</button>
              <button type="button" data-lang-option="kn">ಕನ್ನಡ</button>
            </div>
          </nav>
        </div>
      </header>

      <!-- Centered form -->
      <main class="flex-1 flex items-center justify-center">
        <section class="form-card w-full max-w-md">
          <div data-flash-messages></div>
          <script type="application/json" data-flash-payload>{{ get_flashed_messages(with_categories=true) | tojson }}</script>

          <form class="stack-form" action="{{ url_for('signup') }}" method="post">

            <label>
              Full Name
              <input type="text" name="full_name" placeholder="Add full name" required />
            </label>

            <label>
              Phone Number
              <input type="tel" name="phone" placeholder="Add phone number" required />
            </label>

            <label>
              Email
              <input type="email" name="email" placeholder="Add email" required />
            </label>

            <!-- Added password -->
            <label>
              Password
              <input type="password" name="password" placeholder="Create password" required />
            </label>

            <!-- Added confirm password -->
            <label>
              Confirm Password
              <input type="password" name="confirm_password" placeholder="Confirm password" required />
            </label>

            <button type="submit" class="primary-btn w-full">
              Create Account
            </button>

            <p class="text-sm mt-3 text-center">
              Already have an account?
              <a href="login.html" class="text-blue-500 hover:underline">
                Login
              </a>
            </p>

          </form>

        </section>
      </main>

    </div>

    <script src="../script.js"></script>
  </body>
</html>
